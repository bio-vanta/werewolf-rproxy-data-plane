apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflare-ddns1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflare-ddns1
  template:
    metadata:
      labels:
        app: cloudflare-ddns1
    spec:
      containers:
        - name: cloudflare-ddns1
          image: favonia/cloudflare-ddns:latest # TODO : Use immutable tag instead of "latest"
          env:
            - name: "DUMMY"
              value: "002" # Use this for restarting pod 

          envFrom:
            - configMapRef:
                name: cloudflare-ddns1
            - secretRef:
                name: cloudflare-ddns1
